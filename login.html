<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Async Tecnologia</title>
  <link rel="icon" type="image/svg+xml" href="./images/favicon.svg">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .login-page {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: clamp(1.75rem, 5vw, 2.5rem);
      border-radius: var(--radius-xl);
      background: var(--liquid-fill);
      backdrop-filter: var(--liquid-blur);
      -webkit-backdrop-filter: var(--liquid-blur);
      border: var(--liquid-border);
      box-shadow: var(--liquid-shadow);
    }

    .login-card__logo {
      display: flex;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .login-card__logo img {
      height: 34px;
      width: auto;
    }

    .login-tabs {
      display: flex;
      gap: 0.35rem;
      background: rgba(0, 0, 0, 0.05);
      border-radius: 999px;
      padding: 0.25rem;
      margin-bottom: 1.75rem;
    }

    .login-tab {
      flex: 1;
      padding: 0.5rem 1rem;
      font-size: 14px;
      font-weight: 500;
      font-family: var(--font-sans);
      letter-spacing: -0.015em;
      border: none;
      border-radius: 999px;
      cursor: pointer;
      background: transparent;
      color: var(--text-secondary);
      transition: background 0.2s, color 0.2s, box-shadow 0.2s;
    }

    .login-tab.is-active {
      background: #fff;
      color: var(--text-primary);
      box-shadow: 0 1px 6px rgba(0,0,0,0.10);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }

    .login-form.is-hidden {
      display: none;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
    }

    .field label {
      font-size: 13px;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--text-secondary);
    }

    .field input {
      width: 100%;
      padding: 0.7rem 1rem;
      font-family: var(--font-sans);
      font-size: 15px;
      letter-spacing: -0.015em;
      color: var(--text-primary);
      background: rgba(255, 255, 255, 0.72);
      border: 1px solid rgba(29, 29, 31, 0.14);
      border-radius: var(--radius-sm);
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      box-sizing: border-box;
    }

    .field input:focus {
      border-color: var(--color-accent);
      box-shadow: 0 0 0 3px rgba(0, 113, 227, 0.15);
      background: #fff;
    }

    .field input::placeholder {
      color: var(--text-tertiary);
    }

    .login-btn {
      width: 100%;
      padding: 0.78rem 1.5rem;
      margin-top: 0.35rem;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      letter-spacing: -0.015em;
      color: #fff;
      background: var(--color-accent);
      border: none;
      border-radius: 999px;
      cursor: pointer;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.22) inset,
        0 4px 14px rgba(0,113,227,0.3);
      transition: background 0.18s, transform 0.15s, box-shadow 0.15s;
    }

    .login-btn:hover {
      background: var(--color-accent-hover);
      transform: scale(1.01);
      box-shadow:
        0 1px 0 rgba(255,255,255,0.3) inset,
        0 6px 20px rgba(0,113,227,0.38);
    }

    .login-btn:active {
      background: var(--color-accent-press);
      transform: scale(0.98);
    }

    .login-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .feedback {
      display: none;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius-sm);
      font-size: 14px;
      letter-spacing: -0.012em;
      font-weight: 500;
      text-align: center;
    }

    .feedback.erro {
      display: block;
      color: #9b1c1c;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
    }

    .feedback.sucesso {
      display: block;
      color: #065f46;
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.2);
    }

    .login-back {
      display: block;
      text-align: center;
      margin-top: 1.35rem;
      font-size: 13px;
      color: var(--text-tertiary);
    }

    .login-back a {
      color: var(--color-accent);
      font-weight: 500;
    }
  </style>
</head>
<body>
  <main class="login-page">
    <div class="login-card">

      <div class="login-card__logo">
        <a href="index.html">
          <img src="./images/logo.svg" alt="Async Tecnologia" height="34">
        </a>
      </div>

      <!-- Abas -->
      <div class="login-tabs" role="tablist">
        <button class="login-tab is-active" role="tab" id="tab-login" aria-controls="form-login" aria-selected="true">
          Entrar
        </button>
        <button class="login-tab" role="tab" id="tab-cadastro" aria-controls="form-cadastro" aria-selected="false">
          Criar conta
        </button>
      </div>

      <!-- Formulário: Login -->
      <form class="login-form" id="form-login" aria-labelledby="tab-login" novalidate>
        <div id="feedback-login" class="feedback" role="alert" aria-live="polite"></div>

        <div class="field">
          <label for="login-email">E-mail</label>
          <input type="email" id="login-email" name="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="login-senha">Senha</label>
          <input type="password" id="login-senha" name="senha" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <button type="submit" class="login-btn">Entrar</button>
      </form>

      <!-- Formulário: Cadastro -->
      <form class="login-form is-hidden" id="form-cadastro" aria-labelledby="tab-cadastro" novalidate>
        <div id="feedback-cadastro" class="feedback" role="alert" aria-live="polite"></div>

        <div class="field">
          <label for="cadastro-nome">Nome completo</label>
          <input type="text" id="cadastro-nome" name="nome" placeholder="Seu nome" autocomplete="name" required>
        </div>

        <div class="field">
          <label for="cadastro-email">E-mail</label>
          <input type="email" id="cadastro-email" name="email" placeholder="seu@email.com" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="cadastro-senha">Senha</label>
          <input type="password" id="cadastro-senha" name="senha" placeholder="Mín. 6 caracteres" autocomplete="new-password" required minlength="6">
        </div>

        <button type="submit" class="login-btn">Criar conta</button>
      </form>

      <span class="login-back">
        <a href="index.html">← Voltar para o site</a>
      </span>

    </div>
  </main>

  <script>
    (function () {
      const tabLogin   = document.getElementById("tab-login");
      const tabCadastro = document.getElementById("tab-cadastro");
      const formLogin  = document.getElementById("form-login");
      const formCadastro = document.getElementById("form-cadastro");

      function ativarAba(aba) {
        if (aba === "login") {
          tabLogin.classList.add("is-active");
          tabCadastro.classList.remove("is-active");
          formLogin.classList.remove("is-hidden");
          formCadastro.classList.add("is-hidden");
          tabLogin.setAttribute("aria-selected", "true");
          tabCadastro.setAttribute("aria-selected", "false");
        } else {
          tabCadastro.classList.add("is-active");
          tabLogin.classList.remove("is-active");
          formCadastro.classList.remove("is-hidden");
          formLogin.classList.add("is-hidden");
          tabCadastro.setAttribute("aria-selected", "true");
          tabLogin.setAttribute("aria-selected", "false");
        }
      }

      tabLogin.addEventListener("click", () => ativarAba("login"));
      tabCadastro.addEventListener("click", () => ativarAba("cadastro"));

      function mostrarFeedback(id, tipo, mensagem) {
        const el = document.getElementById(id);
        el.className = "feedback " + tipo;
        el.textContent = mensagem;
      }

      function limparFeedback(id) {
        const el = document.getElementById(id);
        el.className = "feedback";
        el.textContent = "";
      }

      // Login
      formLogin.addEventListener("submit", async function (e) {
        e.preventDefault();
        limparFeedback("feedback-login");
        const btn = formLogin.querySelector("button[type=submit]");
        const email = document.getElementById("login-email").value.trim();
        const senha = document.getElementById("login-senha").value;

        btn.disabled = true;
        btn.textContent = "Entrando...";

        try {
          const res = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, senha }),
          });
          const data = await res.json();

          if (res.ok) {
            mostrarFeedback("feedback-login", "sucesso", "✓ " + data.mensagem);
            sessionStorage.setItem("usuario_nome", data.usuario.nome);
            sessionStorage.setItem("usuario_email", data.usuario.email);
            setTimeout(() => { window.location.href = "index.html"; }, 1200);
          } else {
            mostrarFeedback("feedback-login", "erro", data.erro || "Erro ao fazer login.");
            btn.disabled = false;
            btn.textContent = "Entrar";
          }
        } catch (err) {
          mostrarFeedback("feedback-login", "erro", "Não foi possível conectar ao servidor. Verifique se ele está rodando.");
          btn.disabled = false;
          btn.textContent = "Entrar";
        }
      });

      // Cadastro
      formCadastro.addEventListener("submit", async function (e) {
        e.preventDefault();
        limparFeedback("feedback-cadastro");
        const btn = formCadastro.querySelector("button[type=submit]");
        const nome  = document.getElementById("cadastro-nome").value.trim();
        const email = document.getElementById("cadastro-email").value.trim();
        const senha = document.getElementById("cadastro-senha").value;

        btn.disabled = true;
        btn.textContent = "Criando conta...";

        try {
          const res = await fetch("/api/registrar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ nome, email, senha }),
          });
          const data = await res.json();

          if (res.ok) {
            mostrarFeedback("feedback-cadastro", "sucesso", "✓ " + (data.mensagem || "Cadastro realizado!") + " Faça o login.");
            formCadastro.reset();
            setTimeout(() => ativarAba("login"), 2000);
          } else {
            mostrarFeedback("feedback-cadastro", "erro", data.erro || "Erro ao criar conta.");
          }
        } catch (err) {
          mostrarFeedback("feedback-cadastro", "erro", "Não foi possível conectar ao servidor. Verifique se ele está rodando.");
        } finally {
          btn.disabled = false;
          btn.textContent = "Criar conta";
        }
      });
    })();
  </script>
</body>
</html>
