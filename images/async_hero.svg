<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="420" viewBox="0 0 680 420" role="img">
  <title>Async Tecnologia — Integração de sistemas e automação de processos</title>
  <desc>Hero ilustrando sistemas, APIs e operações conectadas por arquitetura orientada a eventos</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      @keyframes dashflow { to { stroke-dashoffset: -20; } }
      @keyframes pulse    { 0%,100%{opacity:.12} 50%{opacity:.22} }
      @keyframes blink    { 0%,100%{opacity:1} 50%{opacity:.4} }
      @media (prefers-reduced-motion: no-preference) {
        .f1    { animation: dashflow 1.8s linear infinite; }
        .f2    { animation: dashflow 2.4s linear infinite .5s; }
        .f3    { animation: dashflow 2.1s linear infinite 1s; }
        .f4    { animation: dashflow 2.6s linear infinite .3s; }
        .fout1 { animation: dashflow 2.0s linear infinite .2s; }
        .fout2 { animation: dashflow 2.5s linear infinite .7s; }
        .pulse-ring  { animation: pulse 3.5s ease-in-out infinite; }
        .dot-blink   { animation: blink 1.8s ease-in-out infinite; }
        .dot-blink2  { animation: blink 1.8s ease-in-out infinite .6s; }
        .dot-blink3  { animation: blink 1.8s ease-in-out infinite 1.2s; }
      }
      .th { font-family: sans-serif; font-size: 14px; font-weight: 600; }
      .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; }
      .node { cursor: pointer; }
    </style>
  </defs>

  <!-- ══ ESQUERDA: clientes ══ -->

  <!-- Fintech -->
  <g class="node">
    <rect x="28" y="88" width="148" height="52" rx="8" fill="#E1F5EE" stroke="#1D9E75" stroke-width=".5"/>
    <circle class="dot-blink" cx="48" cy="108" r="4" fill="#1D9E75"/>
    <text class="th" x="90" y="108" text-anchor="middle" dominant-baseline="central" fill="#085041">Fintech</text>
    <text class="ts" x="90" y="127" text-anchor="middle" dominant-baseline="central" fill="#0F6E56">Pagamentos e banking</text>
  </g>

  <!-- E-commerce -->
  <g class="node">
    <rect x="28" y="184" width="148" height="52" rx="8" fill="#EEEDFE" stroke="#7F77DD" stroke-width=".5"/>
    <circle class="dot-blink2" cx="48" cy="204" r="4" fill="#7F77DD"/>
    <text class="th" x="90" y="204" text-anchor="middle" dominant-baseline="central" fill="#26215C">E-commerce</text>
    <text class="ts" x="90" y="223" text-anchor="middle" dominant-baseline="central" fill="#534AB7">Pedidos e estoque</text>
  </g>

  <!-- Startup B2B -->
  <g class="node">
    <rect x="28" y="280" width="148" height="52" rx="8" fill="#FAECE7" stroke="#D85A30" stroke-width=".5"/>
    <circle class="dot-blink3" cx="48" cy="300" r="4" fill="#D85A30"/>
    <text class="th" x="90" y="300" text-anchor="middle" dominant-baseline="central" fill="#4A1B0C">Startup B2B</text>
    <text class="ts" x="90" y="319" text-anchor="middle" dominant-baseline="central" fill="#993C1D">APIs e integrações</text>
  </g>

  <!-- Linhas entrada → hub -->
  <line class="f1" x1="176" y1="114" x2="262" y2="196" stroke="#1D9E75" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".75"/>
  <line class="f2" x1="176" y1="210" x2="262" y2="207" stroke="#7F77DD" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".75"/>
  <line class="f3" x1="176" y1="306" x2="262" y2="218" stroke="#D85A30" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".75"/>

  <!-- ══ CENTRO: hub Async ══ -->
  <circle class="pulse-ring" cx="340" cy="207" r="55" fill="none" stroke="#185FA5" stroke-width="1.5"/>

  <rect x="262" y="159" width="156" height="96" rx="16" fill="#185FA5" stroke="#85B7EB" stroke-width="1"/>

  <!-- Event lanes -->
  <rect x="278" y="175" width="124" height="10" rx="3" fill="#0C447C" opacity=".7"/>
  <rect x="278" y="191" width="124" height="10" rx="3" fill="#0C447C" opacity=".7"/>
  <rect x="278" y="207" width="124" height="10" rx="3" fill="#0C447C" opacity=".7"/>

  <!-- Packets -->
  <rect class="f1" x="284" y="177" width="14" height="6" rx="2" fill="#85B7EB"/>
  <rect class="f3" x="306" y="193" width="14" height="6" rx="2" fill="#85B7EB" opacity=".9"/>
  <rect class="f2" x="326" y="209" width="14" height="6" rx="2" fill="#85B7EB" opacity=".8"/>

  <!-- Hub labels -->
  <text class="th" x="340" y="234" text-anchor="middle" dominant-baseline="central" fill="#E6F1FB">Async</text>
  <text class="ts" x="340" y="248" text-anchor="middle" dominant-baseline="central" fill="#85B7EB">Event-driven core</text>

  <!-- ══ DIREITA: sistemas conectados ══ -->

  <!-- Linhas hub → direita -->
  <line class="fout1" x1="418" y1="193" x2="504" y2="114" stroke="#378ADD" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".7"/>
  <line class="f4"    x1="418" y1="207" x2="504" y2="210" stroke="#378ADD" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".7"/>
  <line class="fout2" x1="418" y1="221" x2="504" y2="306" stroke="#378ADD" stroke-width="1.5" fill="none" stroke-dasharray="5 5" marker-end="url(#arrow)" opacity=".7"/>

  <!-- ERP / CRM -->
  <g class="node">
    <rect x="504" y="88" width="148" height="52" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width=".5"/>
    <circle class="dot-blink" cx="524" cy="108" r="4" fill="#378ADD"/>
    <text class="th" x="566" y="108" text-anchor="middle" dominant-baseline="central" fill="#042C53">ERP / CRM</text>
    <text class="ts" x="566" y="127" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Plataformas internas</text>
  </g>

  <!-- APIs externas -->
  <g class="node">
    <rect x="504" y="184" width="148" height="52" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width=".5"/>
    <circle class="dot-blink2" cx="524" cy="204" r="4" fill="#378ADD"/>
    <text class="th" x="566" y="204" text-anchor="middle" dominant-baseline="central" fill="#042C53">APIs externas</text>
    <text class="ts" x="566" y="223" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Webhooks e REST</text>
  </g>

  <!-- Automações -->
  <g class="node">
    <rect x="504" y="280" width="148" height="52" rx="8" fill="#E6F1FB" stroke="#378ADD" stroke-width=".5"/>
    <circle class="dot-blink3" cx="524" cy="300" r="4" fill="#378ADD"/>
    <text class="th" x="566" y="300" text-anchor="middle" dominant-baseline="central" fill="#042C53">Automações</text>
    <text class="ts" x="566" y="319" text-anchor="middle" dominant-baseline="central" fill="#185FA5">Workers e processos</text>
  </g>

  <!-- Tagline rodapé -->
  <text class="ts" x="340" y="390" text-anchor="middle" fill="#888780">Sistemas resilientes · Desacoplados · Prontos para crescer</text>

  <!-- Dot grid decorativo -->
  <g opacity=".06" fill="#888780">
    <circle cx="20" cy="20" r="2"/> <circle cx="50" cy="20" r="2"/> <circle cx="80" cy="20" r="2"/>
    <circle cx="600" cy="20" r="2"/> <circle cx="630" cy="20" r="2"/> <circle cx="660" cy="20" r="2"/>
    <circle cx="20" cy="370" r="2"/> <circle cx="50" cy="370" r="2"/> <circle cx="80" cy="370" r="2"/>
    <circle cx="600" cy="370" r="2"/> <circle cx="630" cy="370" r="2"/> <circle cx="660" cy="370" r="2"/>
  </g>
</svg>
